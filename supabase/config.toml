# Supabase CLI local stack config. `supabase start` reads this to bring up
# Postgres + GoTrue (auth) + PostgREST locally; `supabase db reset` applies
# supabase/migrations/* and supabase/seed.sql. See the README for the dev flow.
project_id = "whatitdo"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

# Catches outbound emails (magic links, confirmations) in a local inbox so the
# OTP/sign-in flow is testable without a real email provider.
[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# Where GoTrue sends users after auth and which redirect URLs are allowed.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Passwordless email magic-link / OTP — matches the app's sign-in.
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
# Magic-link sign-in; no passwords.
double_confirm_changes = true
