# Supabase CLI local stack config. `supabase start` reads this to bring up
# Postgres + GoTrue (auth) + PostgREST locally; `supabase db reset` applies
# supabase/migrations/* and supabase/seed.sql.
#
# Caveat: supabase/migrations/ now holds only the >=034 range (the <=033 base
# lives in supabase/migrations-legacy/, applied by the legacy runner via
# `npm run migrate` + PGlite) — so `supabase db reset` / `supabase start` no
# longer builds a complete schema on its own. PGlite is the supported local
# dev/test path (see README), not `db reset`. See the README for the dev flow.
project_id = "whatitdo"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

# Catches outbound emails (opt-in magic links, password resets) in a local inbox
# so the email flows are testable without a real email provider.
[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# Where GoTrue sends users after auth and which redirect URLs are allowed.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# Email+password is the default sign-in. Enforce a minimum password length;
# passwordless magic links stay available as a per-account opt-in.
minimum_password_length = 8

[auth.email]
enable_signup = true
# No confirmation email on sign-up: password sign-up establishes a session
# immediately, so the default flow sends no email (keeps email cost/quota down).
enable_confirmations = false
double_confirm_changes = true
